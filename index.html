<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STP - Satış & Takip Programı</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#1a237e;--primary-light:#283593;--primary-dark:#0d1442;--accent:#ff6f00;--accent-light:#ffa000;--bg:#f0f2f5;--card:#fff;--text:#1e293b;--text-light:#64748b;--green:#16a34a;--blue:#2563eb;--purple:#7c3aed;--red:#dc2626;--orange:#ea580c;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 50%,var(--primary-light) 100%);padding:20px}
.login-box{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{font-size:48px;margin-bottom:8px}
.login-box h1{font-size:28px;font-weight:800;color:var(--primary);margin-bottom:4px}
.login-box p{color:var(--text-light);margin-bottom:32px;font-size:14px}
.login-box input{width:100%;padding:14px 18px;border:2px solid #e2e8f0;border-radius:12px;font-size:16px;transition:.2s;outline:none;margin-bottom:16px}
.login-box input:focus{border-color:var(--primary)}
.btn-login{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;transition:.2s}
.btn-login:hover{background:var(--primary-light)}

/* HEADER */
.header{background:linear-gradient(135deg,var(--primary-dark),var(--primary));color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.header-left{display:flex;align-items:center;gap:12px}
.header-left h1{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.header-left span.logo-icon{font-size:28px}
.user-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);padding:8px 14px;border-radius:10px;font-size:14px;font-weight:500}
.admin-badge{background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:6px;font-weight:700}
.btn-logout{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 16px;border-radius:10px;font-size:13px;font-weight:600;transition:.2s}
.btn-logout:hover{background:rgba(255,255,255,.25)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;padding:20px;max-width:1200px;margin:0 auto}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.stat-card.s1::before{background:var(--blue)}
.stat-card.s2::before{background:var(--orange)}
.stat-card.s3::before{background:var(--green)}
.stat-card.s4::before{background:var(--purple)}
.stat-card.s5::before{background:var(--accent)}
.stat-num{font-size:32px;font-weight:800;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text-light);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* FILTERS */
.filters{padding:0 20px 10px;max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-btn{padding:8px 18px;border-radius:20px;border:2px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;color:var(--text-light);transition:.2s}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-btn:hover:not(.active){border-color:var(--primary);color:var(--primary)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}

/* WEEKLY REPORT */
.weekly-section{padding:10px 20px;max-width:1200px;margin:0 auto}
.weekly-box{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow)}
.weekly-box h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.weekly-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px}
.weekly-item{background:rgba(255,255,255,.15);border-radius:10px;padding:12px;text-align:center}
.weekly-item .wnum{font-size:24px;font-weight:800}
.weekly-item .wlabel{font-size:11px;opacity:.85;margin-top:2px}

/* ADMIN USERS */
.admin-section{padding:10px 20px;max-width:1200px;margin:0 auto}
.admin-box{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.admin-box h3{font-size:16px;margin-bottom:14px;color:var(--primary);display:flex;align-items:center;gap:8px}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f1f5f9}
.user-row:last-child{border:none}
.user-name{font-weight:600;font-size:14px}
.user-stats{display:flex;gap:16px;font-size:12px;color:var(--text-light)}
.user-stats span{display:flex;align-items:center;gap:4px}

/* CARDS */
.cards-container{padding:10px 20px 100px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.project-card{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);display:flex;transition:.2s}
.project-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.12);transform:translateY(-2px)}
.card-stripe{width:6px;flex-shrink:0}
.stripe-green{background:var(--green)}
.stripe-blue{background:var(--blue)}
.stripe-purple{background:var(--purple)}
.stripe-orange{background:var(--orange)}
.stripe-red{background:var(--red)}
.card-body{padding:16px;flex:1;min-width:0}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.card-customer{font-size:16px;font-weight:700;color:var(--primary)}
.status-chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap}
.chip-teklif-hazir{background:#fef3c7;color:#92400e}
.chip-verildi{background:#dbeafe;color:#1e40af}
.chip-revizyon{background:#ede9fe;color:#5b21b6}
.chip-alindi{background:#dcfce7;color:#166534}
.chip-alinamadi{background:#fee2e2;color:#991b1b}
.card-info{font-size:13px;color:var(--text-light);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card-info .material-icons-round{font-size:16px}
.card-amount{font-size:15px;font-weight:700;color:var(--green);margin-top:8px}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9;font-size:12px;color:var(--text-light)}
.card-actions{display:flex;gap:6px}
.card-actions button{background:none;border:1px solid #e2e8f0;border-radius:8px;padding:4px 8px;font-size:12px;color:var(--text-light);transition:.2s;display:flex;align-items:center;gap:2px}
.card-actions button:hover{border-color:var(--primary);color:var(--primary)}
.card-actions button.del:hover{border-color:var(--red);color:var(--red)}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-light)}
.empty-state .material-icons-round{font-size:64px;opacity:.3;margin-bottom:12px}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:60px;height:60px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:32px;box-shadow:0 6px 24px rgba(26,35,126,.4);z-index:90;transition:.2s;display:flex;align-items:center;justify-content:center}
.fab:hover{transform:scale(1.1);background:var(--primary-light)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:28px 24px 40px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:20px;font-weight:700;margin-bottom:20px;color:var(--primary);display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-light);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none;transition:.2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-gps{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;margin-top:4px;display:inline-flex;align-items:center;gap:4px}
.btn-submit{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;margin-top:8px;transition:.2s}
.btn-submit:hover{background:var(--primary-light)}
.btn-cancel{width:100%;padding:12px;background:none;color:var(--text-light);border:2px solid #e2e8f0;border-radius:12px;font-size:14px;font-weight:600;margin-top:8px}
.hidden{display:none!important}

/* EDIT MODAL */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;display:none;align-items:center;justify-content:center;padding:20px}
.edit-overlay.show{display:flex}
.edit-modal{background:#fff;border-radius:16px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:24px}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:300;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}

/* RESPONSIVE */
@media(max-width:600px){
  .header-inner{flex-direction:column;align-items:stretch;gap:8px}
  .header-right{display:flex;justify-content:space-between;align-items:center}
  .cards-container{grid-template-columns:1fr}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .modal{border-radius:16px 16px 0 0;padding:20px 16px 32px}
  .form-row{grid-template-columns:1fr}
  .login-box{padding:32px 24px}
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-page">
  <div class="login-box">
    <div class="login-logo">🏗️</div>
    <h1>STP</h1>
    <p>Satış & Takip Programı</p>
    <input type="text" id="loginName" placeholder="Adınızı giriniz..." autocomplete="off" autofocus>
    <button class="btn-login" onclick="doLogin()">Giriş Yap</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="header-left">
        <span class="logo-icon">🏗️</span>
        <h1>STP</h1>
      </div>
      <div class="header-right">
        <div class="user-badge">
          <span class="material-icons-round" style="font-size:18px">person</span>
          <span id="headerUser"></span>
          <span id="adminBadge" class="admin-badge hidden">Yönetici</span>
        </div>
        <button class="btn-logout" onclick="doLogout()">
          <span class="material-icons-round" style="font-size:16px;vertical-align:middle">logout</span> Çıkış
        </button>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card s1"><div class="stat-num" id="statTotal">0</div><div class="stat-label">Toplam Müşteri</div></div>
    <div class="stat-card s2"><div class="stat-num" id="statPending">0</div><div class="stat-label">Bekleyen Teklif</div></div>
    <div class="stat-card s3"><div class="stat-num" id="statWon">0</div><div class="stat-label">Alınan İş</div></div>
    <div class="stat-card s4"><div class="stat-num" id="statArea">0</div><div class="stat-label">Toplam m²</div></div>
    <div class="stat-card s5"><div class="stat-num" id="statRevenue">₺0</div><div class="stat-label">Toplam Ciro</div></div>
  </div>

  <!-- WEEKLY REPORT (Admin only) -->
  <div class="weekly-section hidden" id="weeklySection">
    <div class="weekly-box">
      <h3><span class="material-icons-round">date_range</span> Bu Haftanın Raporu</h3>
      <div class="weekly-grid">
        <div class="weekly-item"><div class="wnum" id="wNew">0</div><div class="wlabel">Yeni Kayıt</div></div>
        <div class="weekly-item"><div class="wnum" id="wWon">0</div><div class="wlabel">Alınan İş</div></div>
        <div class="weekly-item"><div class="wnum" id="wLost">0</div><div class="wlabel">Alınamadı</div></div>
        <div class="weekly-item"><div class="wnum" id="wRevenue">₺0</div><div class="wlabel">Haftalık Ciro</div></div>
      </div>
    </div>
  </div>

  <!-- ADMIN: USER LIST -->
  <div class="admin-section hidden" id="adminSection">
    <div class="admin-box">
      <h3><span class="material-icons-round">group</span> Personel Özeti</h3>
      <div id="userList"></div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">Hepsi</button>
    <button class="filter-btn" data-filter="Teklif Hazırlanacak" onclick="setFilter('Teklif Hazırlanacak',this)"><span class="dot" style="background:var(--orange)"></span>Teklif Hazır.</button>
    <button class="filter-btn" data-filter="Teklif Verildi" onclick="setFilter('Teklif Verildi',this)"><span class="dot" style="background:var(--blue)"></span>Verildi</button>
    <button class="filter-btn" data-filter="Revizyon" onclick="setFilter('Revizyon',this)"><span class="dot" style="background:var(--purple)"></span>Revizyon</button>
    <button class="filter-btn" data-filter="İş Alındı" onclick="setFilter('İş Alındı',this)"><span class="dot" style="background:var(--green)"></span>Alındı</button>
    <button class="filter-btn" data-filter="İş Alınamadı" onclick="setFilter('İş Alınamadı',this)"><span class="dot" style="background:var(--red)"></span>Alınamadı</button>
  </div>

  <!-- CARDS -->
  <div class="cards-container" id="cardsContainer"></div>

  <!-- FAB -->
  <button class="fab" onclick="openModal()">
    <span class="material-icons-round">add</span>
  </button>
</div>

<!-- NEW RECORD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2><span class="material-icons-round">add_circle</span> Yeni Kayıt</h2>
    <div class="form-group">
      <label>Müşteri / Proje Adı *</label>
      <input type="text" id="fCustomer" placeholder="Müşteri veya proje adı...">
    </div>
    <div class="form-group">
      <label>Adres</label>
      <input type="text" id="fAddress" placeholder="Adres bilgisi...">
    </div>
    <div class="form-group">
      <label>Konum (GPS)</label>
      <input type="text" id="fLocation" placeholder="Enlem, Boylam" readonly>
      <button class="btn-gps" onclick="getGPS()"><span class="material-icons-round" style="font-size:16px">my_location</span> Konumumu Al</button>
    </div>
    <div class="form-group">
      <label>Durum *</label>
      <select id="fStatus" onchange="toggleAreaFields()">
        <option value="">Seçiniz...</option>
        <option value="Teklif Hazırlanacak">📋 Teklif Hazırlanacak</option>
        <option value="Teklif Verildi">📤 Teklif Verildi</option>
        <option value="Revizyon">🔄 Revizyon</option>
        <option value="İş Alındı">✅ İş Alındı</option>
        <option value="İş Alınamadı">❌ İş Alınamadı</option>
      </select>
    </div>
    <div class="form-row hidden" id="areaFields">
      <div class="form-group">
        <label>m²</label>
        <input type="number" id="fArea" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Birim Fiyat (₺/m²)</label>
        <input type="number" id="fPrice" placeholder="0" min="0">
      </div>
    </div>
    <div class="form-group">
      <label>Notlar</label>
      <textarea id="fNotes" placeholder="Ek notlar..."></textarea>
    </div>
    <button class="btn-submit" onclick="saveRecord()">Kaydet</button>
    <button class="btn-cancel" onclick="closeModal()">İptal</button>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-modal">
    <h2 style="font-size:18px;color:var(--primary);margin-bottom:16px"><span class="material-icons-round">edit</span> Kaydı Düzenle</h2>
    <div class="form-group"><label>Müşteri / Proje Adı</label><input type="text" id="eCustomer"></div>
    <div class="form-group"><label>Adres</label><input type="text" id="eAddress"></div>
    <div class="form-group">
      <label>Durum</label>
      <select id="eStatus" onchange="toggleEditAreaFields()">
        <option value="Teklif Hazırlanacak">📋 Teklif Hazırlanacak</option>
        <option value="Teklif Verildi">📤 Teklif Verildi</option>
        <option value="Revizyon">🔄 Revizyon</option>
        <option value="İş Alındı">✅ İş Alındı</option>
        <option value="İş Alınamadı">❌ İş Alınamadı</option>
      </select>
    </div>
    <div class="form-row" id="eAreaFields">
      <div class="form-group"><label>m²</label><input type="number" id="eArea" min="0"></div>
      <div class="form-group"><label>Birim Fiyat (₺/m²)</label><input type="number" id="ePrice" min="0"></div>
    </div>
    <div class="form-group"><label>Notlar</label><textarea id="eNotes"></textarea></div>
    <input type="hidden" id="eDocId">
    <button class="btn-submit" onclick="updateRecord()">Güncelle</button>
    <button class="btn-cancel" onclick="closeEdit()">İptal</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDfKX9HJnLh59Hl_GWffh5U7Hemp0EaLxU",
  authDomain:"stp-proje.firebaseapp.com",
  projectId:"stp-proje",
  storageBucket:"stp-proje.firebasestorage.app",
  messagingSenderId:"425140482397",
  appId:"1:425140482397:web:47b30071226a364be478b4"
});
const db = firebase.firestore();
const projectsRef = db.collection("projects");

let currentUser = "";
let isAdmin = false;
let allProjects = [];
let currentFilter = "all";
let unsubscribe = null;

// LOGIN
function doLogin(){
  const name = document.getElementById("loginName").value.trim();
  if(!name){showToast("Lütfen adınızı girin!");return}
  currentUser = name;
  isAdmin = name.toLowerCase().replace(/İ/g,"i").replace(/I/g,"ı") === "hüseyin" || name.toLowerCase() === "huseyin" || name.toLowerCase() === "hüseyin";
  localStorage.setItem("stp_user", name);
  showApp();
}
document.getElementById("loginName").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});

function doLogout(){
  if(unsubscribe) unsubscribe();
  localStorage.removeItem("stp_user");
  currentUser="";isAdmin=false;allProjects=[];
  document.getElementById("mainApp").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("loginName").value="";
}

// AUTO LOGIN
(function(){
  const saved = localStorage.getItem("stp_user");
  if(saved){
    currentUser = saved;
    isAdmin = saved.toLowerCase().replace(/İ/g,"i").replace(/I/g,"ı") === "hüseyin" || saved.toLowerCase() === "huseyin" || saved.toLowerCase() === "hüseyin";
    showApp();
  }
})();

function showApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("mainApp").classList.remove("hidden");
  document.getElementById("headerUser").textContent = currentUser;
  if(isAdmin){
    document.getElementById("adminBadge").classList.remove("hidden");
    document.getElementById("weeklySection").classList.remove("hidden");
    document.getElementById("adminSection").classList.remove("hidden");
  } else {
    document.getElementById("adminBadge").classList.add("hidden");
    document.getElementById("weeklySection").classList.add("hidden");
    document.getElementById("adminSection").classList.add("hidden");
  }
  startListening();
}

// REALTIME LISTENER
function startListening(){
  if(unsubscribe) unsubscribe();
  let query = projectsRef.orderBy("createdAt","desc");
  if(!isAdmin){
    query = projectsRef.where("addedBy","==",currentUser).orderBy("createdAt","desc");
  }
  unsubscribe = query.onSnapshot(snap=>{
    allProjects = [];
    snap.forEach(doc=>{ allProjects.push({id:doc.id,...doc.data()}) });
    renderAll();
  }, err=>{
    console.error("Firestore error:",err);
    // Fallback: try without orderBy for composite index issues
    let q2 = isAdmin ? projectsRef : projectsRef.where("addedBy","==",currentUser);
    unsubscribe = q2.onSnapshot(snap=>{
      allProjects = [];
      snap.forEach(doc=>{ allProjects.push({id:doc.id,...doc.data()}) });
      allProjects.sort((a,b)=>(b.createdAt?.toMillis?.()||0)-(a.createdAt?.toMillis?.()||0));
      renderAll();
    });
  });
}

function renderAll(){
  renderStats();
  renderCards();
  if(isAdmin){renderWeekly();renderUsers();}
}

// STATS
function renderStats(){
  const data = allProjects;
  const total = data.length;
  const pending = data.filter(p=>p.status==="Teklif Hazırlanacak"||p.status==="Teklif Verildi"||p.status==="Revizyon").length;
  const won = data.filter(p=>p.status==="İş Alındı").length;
  let area=0, revenue=0;
  data.filter(p=>p.status==="İş Alındı").forEach(p=>{
    const a=parseFloat(p.area)||0;
    const pr=parseFloat(p.unitPrice)||0;
    area+=a; revenue+=a*pr;
  });
  document.getElementById("statTotal").textContent=total;
  document.getElementById("statPending").textContent=pending;
  document.getElementById("statWon").textContent=won;
  document.getElementById("statArea").textContent=formatNum(area);
  document.getElementById("statRevenue").textContent="₺"+formatNum(revenue);
}

// WEEKLY
function renderWeekly(){
  const now=new Date();
  const day=now.getDay();
  const diff=now.getDate()-day+(day===0?-6:1);
  const weekStart=new Date(now.getFullYear(),now.getMonth(),diff,0,0,0,0);
  const weekData=allProjects.filter(p=>{
    if(!p.createdAt)return false;
    const d=p.createdAt.toDate?p.createdAt.toDate():new Date(p.createdAt);
    return d>=weekStart;
  });
  const wWon=weekData.filter(p=>p.status==="İş Alındı");
  const wLost=weekData.filter(p=>p.status==="İş Alınamadı");
  let wRev=0;
  wWon.forEach(p=>{wRev+=(parseFloat(p.area)||0)*(parseFloat(p.unitPrice)||0)});
  document.getElementById("wNew").textContent=weekData.length;
  document.getElementById("wWon").textContent=wWon.length;
  document.getElementById("wLost").textContent=wLost.length;
  document.getElementById("wRevenue").textContent="₺"+formatNum(wRev);
}

// USERS
function renderUsers(){
  const userMap={};
  allProjects.forEach(p=>{
    const u=p.addedBy||"Bilinmiyor";
    if(!userMap[u])userMap[u]={total:0,won:0,area:0,revenue:0};
    userMap[u].total++;
    if(p.status==="İş Alındı"){
      userMap[u].won++;
      const a=parseFloat(p.area)||0;
      userMap[u].area+=a;
      userMap[u].revenue+=a*(parseFloat(p.unitPrice)||0);
    }
  });
  let html="";
  Object.keys(userMap).sort().forEach(u=>{
    const d=userMap[u];
    html+=`<div class="user-row">
      <div class="user-name">${esc(u)}</div>
      <div class="user-stats">
        <span>📋 ${d.total}</span>
        <span>✅ ${d.won}</span>
        <span>📐 ${formatNum(d.area)} m²</span>
        <span>💰 ₺${formatNum(d.revenue)}</span>
      </div>
    </div>`;
  });
  document.getElementById("userList").innerHTML=html||"<p style='color:var(--text-light);font-size:13px'>Henüz kayıt yok.</p>";
}

// CARDS
function renderCards(){
  const container=document.getElementById("cardsContainer");
  let filtered=currentFilter==="all"?allProjects:allProjects.filter(p=>p.status===currentFilter);
  if(!filtered.length){
    container.innerHTML=`<div class="empty-state"><span class="material-icons-round">assignment</span><p>Henüz kayıt yok.<br>+ butonuna basarak ekleyin.</p></div>`;
    return;
  }
  let html="";
  filtered.forEach(p=>{
    const stripe=getStripe(p.status);
    const chip=getChip(p.status);
    const amount=(p.status==="İş Alındı"&&p.area&&p.unitPrice)?`<div class="card-amount">₺${formatNum((parseFloat(p.area)||0)*(parseFloat(p.unitPrice)||0))} <span style="font-size:12px;font-weight:400;color:var(--text-light)">(${formatNum(p.area)} m² × ₺${formatNum(p.unitPrice)})</span></div>`:"";
    const date=p.createdAt?(p.createdAt.toDate?p.createdAt.toDate():new Date(p.createdAt)).toLocaleDateString("tr-TR",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}):"";
    const loc=p.location?`<div class="card-info"><span class="material-icons-round">location_on</span><a href="https://maps.google.com/?q=${p.location}" target="_blank" style="color:var(--blue);text-decoration:none;font-size:12px">Haritada Gör</a></div>`:"";
    html+=`<div class="project-card">
      <div class="card-stripe ${stripe}"></div>
      <div class="card-body">
        <div class="card-top">
          <div class="card-customer">${esc(p.customerName||"")}</div>
          <span class="status-chip ${chip}">${esc(p.status||"")}</span>
        </div>
        ${p.address?`<div class="card-info"><span class="material-icons-round">place</span>${esc(p.address)}</div>`:""}
        ${loc}
        ${p.notes?`<div class="card-info"><span class="material-icons-round">notes</span>${esc(p.notes)}</div>`:""}
        ${amount}
        <div class="card-meta">
          <span><span class="material-icons-round" style="font-size:14px;vertical-align:middle">person</span> ${esc(p.addedBy||"")} · ${date}</span>
          <div class="card-actions">
            <button onclick="openEdit('${p.id}')"><span class="material-icons-round" style="font-size:14px">edit</span></button>
            <button class="del" onclick="deleteRecord('${p.id}')"><span class="material-icons-round" style="font-size:14px">delete</span></button>
          </div>
        </div>
      </div>
    </div>`;
  });
  container.innerHTML=html;
}

function getStripe(s){
  if(s==="İş Alındı")return"stripe-green";
  if(s==="Teklif Verildi")return"stripe-blue";
  if(s==="Revizyon")return"stripe-purple";
  if(s==="Teklif Hazırlanacak")return"stripe-orange";
  if(s==="İş Alınamadı")return"stripe-red";
  return"stripe-blue";
}
function getChip(s){
  if(s==="İş Alındı")return"chip-alindi";
  if(s==="Teklif Verildi")return"chip-verildi";
  if(s==="Revizyon")return"chip-revizyon";
  if(s==="Teklif Hazırlanacak")return"chip-teklif-hazir";
  if(s==="İş Alınamadı")return"chip-alinamadi";
  return"chip-verildi";
}

// FILTER
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderCards();
}

// MODAL
function openModal(){document.getElementById("modalOverlay").classList.add("show")}
function closeModal(){
  document.getElementById("modalOverlay").classList.remove("show");
  ["fCustomer","fAddress","fLocation","fNotes","fArea","fPrice"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("fStatus").value="";
  document.getElementById("areaFields").classList.add("hidden");
}
function toggleAreaFields(){
  document.getElementById("areaFields").classList.toggle("hidden",document.getElementById("fStatus").value!=="İş Alındı");
}

// GPS
function getGPS(){
  if(!navigator.geolocation){showToast("GPS desteklenmiyor!");return}
  showToast("Konum alınıyor...");
  navigator.geolocation.getCurrentPosition(pos=>{
    document.getElementById("fLocation").value=pos.coords.latitude.toFixed(6)+", "+pos.coords.longitude.toFixed(6);
    showToast("Konum alındı! ✓");
  },err=>{showToast("Konum alınamadı: "+err.message)},{enableHighAccuracy:true,timeout:10000});
}

// SAVE
function saveRecord(){
  const customer=document.getElementById("fCustomer").value.trim();
  const status=document.getElementById("fStatus").value;
  if(!customer){showToast("Müşteri adı gerekli!");return}
  if(!status){showToast("Durum seçiniz!");return}
  const data={
    customerName:customer,
    address:document.getElementById("fAddress").value.trim(),
    location:document.getElementById("fLocation").value.trim(),
    status:status,
    area:status==="İş Alındı"?document.getElementById("fArea").value:"",
    unitPrice:status==="İş Alındı"?document.getElementById("fPrice").value:"",
    notes:document.getElementById("fNotes").value.trim(),
    addedBy:currentUser,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  projectsRef.add(data).then(()=>{
    showToast("Kayıt eklendi! ✓");
    closeModal();
  }).catch(err=>{showToast("Hata: "+err.message)});
}

// EDIT
function openEdit(id){
  const p=allProjects.find(x=>x.id===id);
  if(!p)return;
  document.getElementById("eDocId").value=id;
  document.getElementById("eCustomer").value=p.customerName||"";
  document.getElementById("eAddress").value=p.address||"";
  document.getElementById("eStatus").value=p.status||"Teklif Hazırlanacak";
  document.getElementById("eArea").value=p.area||"";
  document.getElementById("ePrice").value=p.unitPrice||"";
  document.getElementById("eNotes").value=p.notes||"";
  toggleEditAreaFields();
  document.getElementById("editOverlay").classList.add("show");
}
function closeEdit(){document.getElementById("editOverlay").classList.remove("show")}
function toggleEditAreaFields(){
  document.getElementById("eAreaFields").classList.toggle("hidden",document.getElementById("eStatus").value!=="İş Alındı");
}
function updateRecord(){
  const id=document.getElementById("eDocId").value;
  const status=document.getElementById("eStatus").value;
  const data={
    customerName:document.getElementById("eCustomer").value.trim(),
    address:document.getElementById("eAddress").value.trim(),
    status:status,
    area:status==="İş Alındı"?document.getElementById("eArea").value:"",
    unitPrice:status==="İş Alındı"?document.getElementById("ePrice").value:"",
    notes:document.getElementById("eNotes").value.trim()
  };
  projectsRef.doc(id).update(data).then(()=>{
    showToast("Güncellendi! ✓");
    closeEdit();
  }).catch(err=>{showToast("Hata: "+err.message)});
}

// DELETE
function deleteRecord(id){
  if(!confirm("Bu kaydı silmek istediğinize emin misiniz?"))return;
  projectsRef.doc(id).delete().then(()=>showToast("Silindi!")).catch(err=>showToast("Hata: "+err.message));
}

// UTILS
function formatNum(n){return Number(n).toLocaleString("tr-TR")}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2500)}
</script>
</body>
</html>
